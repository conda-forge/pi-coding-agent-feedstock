context:
  name: pi-coding-agent
  version: "0.75.5"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://registry.npmjs.org/@earendil-works/pi-coding-agent/-/pi-coding-agent-${{ version }}.tgz
    sha256: 88fff74d1fcc93343e839aa885eacb35e88cdaab97dac2636b11becc3b2499fc
  - url: https://raw.githubusercontent.com/earendil-works/pi/main/LICENSE
    sha256: 0457f5bcec3b3b211605dfb5d1a49042fd638f3686a410fe099c24a25af13c48
    file_name: LICENSE

build:
  number: 1
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs >=20.6.0

tests:
  - requirements:
      run:
        - nodejs
    script:
      - pi --help

about:
  summary: Coding agent CLI with read, bash, edit, write tools and session management
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/earendil-works/pi
  repository: https://github.com/earendil-works/pi

extra:
  recipe-maintainers:
    - moritzwilksch
    - janjagusch
