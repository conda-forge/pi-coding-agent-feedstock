context:
  name: pi-coding-agent
  version: "0.80.3"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://registry.npmjs.org/@earendil-works/pi-coding-agent/-/pi-coding-agent-${{ version }}.tgz
    sha256: 155c5800134cb8df6c47adb3eab56415e8fa7746e0b1cba6687134137c451d90
  - url: https://raw.githubusercontent.com/earendil-works/pi/main/LICENSE
    sha256: 0457f5bcec3b3b211605dfb5d1a49042fd638f3686a410fe099c24a25af13c48
    file_name: LICENSE

build:
  number: 0
  script:
    file: build
    env:
      # Exposed so build.bat can select the target arch's native prebuilts when
      # cross-compiling win-arm64 on a win-64 runner.
      target_platform: ${{ target_platform }}
  dynamic_linking:
    binary_relocation: false
  skip:
    - ppc64le

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs >=20.6.0

tests:
  - requirements:
      run:
        - nodejs
    script:
      - pi --help

about:
  summary: Coding agent CLI with read, bash, edit, write tools and session management
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/earendil-works/pi
  repository: https://github.com/earendil-works/pi

extra:
  recipe-maintainers:
    - xhochy
    - moritzwilksch
    - janjagusch
