context:
  name: pi-coding-agent
  version: "0.68.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://registry.npmjs.org/@mariozechner/pi-coding-agent/-/pi-coding-agent-${{ version }}.tgz
    sha256: e3127324c6eeb72f7af9dd2a281577608a998d5cd9cbbfa195e706aefec5a16c
  - url: https://raw.githubusercontent.com/badlogic/pi-mono/main/LICENSE
    sha256: 0457f5bcec3b3b211605dfb5d1a49042fd638f3686a410fe099c24a25af13c48
    file_name: LICENSE

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs >=20.6.0

tests:
  - requirements:
      run:
        - nodejs
    script:
      - pi --help

about:
  summary: Coding agent CLI with read, bash, edit, write tools and session management
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/badlogic/pi-mono
  repository: https://github.com/badlogic/pi-mono

extra:
  recipe-maintainers:
    - moritzwilksch
